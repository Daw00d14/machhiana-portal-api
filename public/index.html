<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Machhiana</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #f8fafc; }
    p { color: #94a3b8; margin-bottom: 2rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .card { background: #1e293b; border-radius: 12px; padding: 1.5rem 2rem; text-decoration: none; color: #e2e8f0; transition: all 0.2s; min-width: 220px; }
    .card:hover { background: #334155; transform: translateY(-2px); }
    .card i { font-size: 1.5rem; display: block; margin-bottom: 0.5rem; }
    .card span { font-size: 1.1rem; font-weight: 600; }
    .card small { display: block; color: #94a3b8; font-size: 0.85rem; margin-top: 0.3rem; }
    .footer { margin-top: 3rem; font-size: 0.85rem; color: #475569; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <h1>Machhiana</h1>
    <p>Overseas Employment Promoter</p>
    <div class="links">
      <a class="card" href="https://daw00d14.github.io/machhiana.com">
        <i class="fas fa-globe"></i>
        <span>Website</span>
        <small>machhiana.com site backup</small>
      </a>
      <a class="card" href="/machh">
        <i class="fas fa-passport"></i>
        <span>Visa Portal</span>
        <small>Login required</small>
      </a>
      <a class="card" href="/api/clients">
        <i class="fas fa-database"></i>
        <span>API</span>
        <small>REST endpoints</small>
      </a>
    </div>
    <div class="footer">© Machhiana OEP</div>
  </div>
</body>
</html>
